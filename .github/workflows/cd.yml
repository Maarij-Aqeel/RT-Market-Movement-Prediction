name: CD Pipeline

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: market-pulse-predictor
  REGISTRY: ghcr.io
  # Set these in GitHub repo Settings → Secrets and variables → Actions:
  #   EC2_HOST       — public IP or hostname of the EC2 instance
  #   EC2_USERNAME   — SSH user (e.g. ubuntu)
  #   EC2_SSH_KEY    — contents of the private key (.pem file)

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false          # build only — push after smoke test
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true           # load into local daemon for smoke test

      - name: Run smoke tests inside container
        run: |
          docker run --rm \
            -e MLFLOW_TRACKING_URI=./mlruns \
            -e REDDIT_CLIENT_ID=dummy \
            -e REDDIT_CLIENT_SECRET=dummy \
            -e REDDIT_USER_AGENT=dummy \
            -e NEWSDATA_API_KEY=dummy \
            ${{ env.IMAGE_NAME }}:latest \
            pytest tests/ -v --tb=short -q --ignore=tests/test_api.py -m "not slow"

      - name: Push image to registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/RT-Market-Movement-Prediction
            git pull origin main
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d
            echo "=== Health check ==="
            sleep 10
            curl -sf http://localhost:8000/health && echo "API healthy" || echo "API not responding"

      - name: Notify deployment status
        if: always()
        run: |
          echo "Deployment ${{ job.status }} for commit ${{ github.sha }}"
