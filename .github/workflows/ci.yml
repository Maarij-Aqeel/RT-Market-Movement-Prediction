name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint with ruff
        run: ruff check src/ scripts/ tests/ --output-format=github

      - name: Run tests
        env:
          # Prevent actual API calls during CI
          REDDIT_CLIENT_ID: dummy
          REDDIT_CLIENT_SECRET: dummy
          REDDIT_USER_AGENT: dummy
          NEWSDATA_API_KEY: dummy
          MLFLOW_TRACKING_URI: ./mlruns
        run: |
          pytest tests/ -v --tb=short \
            --cov=src --cov-report=term-missing \
            --ignore=tests/test_api.py \
            -m "not slow"

      - name: Test API endpoints (with mock server)
        env:
          MLFLOW_TRACKING_URI: ./mlruns
        run: |
          pytest tests/test_api.py -v --tb=short

  check-contributors:
    name: Verify Contributor Distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commit distribution
        run: |
          echo "=== Commit Distribution ==="
          git shortlog -sn --all --no-merges
          UNIQUE=$(git log --format='%ae' --no-merges | sort -u | wc -l | tr -d ' ')
          echo "Unique authors: $UNIQUE"
          if [ "$UNIQUE" -lt 3 ]; then
            echo "::warning::Less than 3 unique commit authors detected"
          fi

      - name: Show branch structure
        run: git branch -a
